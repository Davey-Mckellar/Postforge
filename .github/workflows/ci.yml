name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Stub vars so Next.js config doesn't crash at type-check time.
      # Real secrets are NOT needed here — we skip next build.
      DATABASE_URL: "postgresql://stub:stub@localhost/stub"
      NEXTAUTH_SECRET: "ci-stub"
      BBGPT_SESSION_SECRET: "ci-stub"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        # Temporarily allow warnings while active development is ongoing.
        # Remove --max-warnings override once codebase is clean.
        env:
          ESLINT_MAX_WARNINGS: "999"
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Test
        run: npm run test
        continue-on-error: true
